# Re-Verse 프론트 서빙 + API 리버스 프록시
# 동일 도메인에서 /api/** 만 백엔드로 넘긴다 → CORS 불필요 (백엔드 main.ts의
# setGlobalPrefix('api') 전제와 정합).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 폴백 (public/_redirects 의 Cloudflare Pages 설정과 동일한 역할)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 프록시 — URI를 그대로 전달하므로 /api prefix가 유지된다.
    # (이미지 업로드는 presigned URL로 Supabase Storage에 직접 올리므로
    #  대용량 바디는 이 경로를 타지 않는다.)
    # 변수 + resolver: 호스트명 해석을 요청 시점으로 지연 — api가 죽어 있어도
    # web은 뜨고 /api만 502. (고정 proxy_pass는 기동 시 해석 실패로 web도 죽음)
    resolver 127.0.0.11 valid=10s; # 도커 내장 DNS
    location /api/ {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
