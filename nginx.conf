# Re-Verse 프론트 서빙 + API 리버스 프록시
# 동일 도메인에서 /api/** 만 백엔드로 넘긴다 → CORS 불필요 (백엔드 main.ts의
# setGlobalPrefix('api') 전제와 정합).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 보안 응답 헤더 (하드닝 감사 2026-07-21) ──
    # 프로덕션은 deploy/nginx-prod.conf(백엔드 레포)가 동일 헤더를 담당하며 이 conf를 덮어쓴다.
    # 이 dev/이미지 기본 conf에도 동일하게 둬서 로컬·오리진 직접 접근까지 방어.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always; # 오리진 격리(OAuth 팝업 허용)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # CSP enforce(2026-07-21): 빌드 index.html에 인라인 스크립트 없음·외부 이미지 없음 확인 후 승격.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://oqvdcypwwvildpqnoqbr.supabase.co; connect-src 'self' https://oqvdcypwwvildpqnoqbr.supabase.co https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # 정적 해시 자산 장기 캐시 (Vite content-hash 파일명 → 안전). 라이트하우스 "cache lifetimes".
    # expires만 사용해 서버 레벨 보안 add_header 상속을 유지(하위 location에 add_header 두면 상속 끊김).
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|svg|png|jpe?g|gif|webp|ico)$ {
        expires 1y;
        access_log off;
    }

    # SPA 폴백 (public/_redirects 의 Cloudflare Pages 설정과 동일한 역할)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 프록시 — URI를 그대로 전달하므로 /api prefix가 유지된다.
    # (이미지 업로드는 presigned URL로 Supabase Storage에 직접 올리므로
    #  대용량 바디는 이 경로를 타지 않는다.)
    # 변수 + resolver: 호스트명 해석을 요청 시점으로 지연 — api가 죽어 있어도
    # web은 뜨고 /api만 502. (고정 proxy_pass는 기동 시 해석 실패로 web도 죽음)
    resolver 127.0.0.11 valid=10s; # 도커 내장 DNS
    location /api/ {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
